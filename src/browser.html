<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>调车计划 — 目录浏览</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Microsoft YaHei', 'SimHei', Arial, sans-serif;
      background: #0c0c0c;
    }

    .layout {
      display: flex;
      width: 100%;
      height: 100%;
    }

    /* ====== 侧边栏 ====== */
    .sidebar {
      width: 240px;
      min-width: 240px;
      height: 100%;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    .sidebar-header {
      padding: 20px 16px 12px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .sidebar-header h2 {
      color: #00bfff;
      font-size: 18px;
      text-shadow: 0 0 10px rgba(0, 191, 255, 0.4);
      margin-bottom: 4px;
    }

    .sidebar-header .subtitle {
      color: rgba(255, 255, 255, 0.4);
      font-size: 11px;
    }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .sidebar-nav::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar-nav::-webkit-scrollbar-track {
      background: transparent;
    }

    .sidebar-nav::-webkit-scrollbar-thumb {
      background: rgba(0, 191, 255, 0.2);
      border-radius: 2px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      cursor: pointer;
      color: #ccc;
      font-size: 14px;
      transition: all 0.2s ease;
      border-left: 3px solid transparent;
      text-decoration: none;
    }

    .nav-item:hover {
      background: rgba(0, 191, 255, 0.08);
      color: #fff;
    }

    .nav-item.active {
      background: rgba(0, 191, 255, 0.12);
      color: #00bfff;
      border-left-color: #00bfff;
    }

    .nav-item .nav-index {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.08);
      font-size: 12px;
      font-weight: bold;
      color: #00bfff;
      flex-shrink: 0;
    }

    .nav-item.active .nav-index {
      background: rgba(0, 191, 255, 0.25);
    }

    .nav-item .nav-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      text-align: center;
    }

    .sidebar-footer .version {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.3);
    }

    /* ====== 右侧 iframe 区域 ====== */
    .content-area {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .content-header {
      padding: 8px 16px;
      background: #1a1a2e;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .content-header .current-file {
      color: #00bfff;
      font-size: 13px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .content-header .divider {
      width: 1px;
      height: 16px;
      background: rgba(255, 255, 255, 0.15);
    }

    .content-header .btn-refresh {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #ccc;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .content-header .btn-refresh:hover {
      background: rgba(0, 191, 255, 0.15);
      color: #fff;
    }

    .iframe-wrapper {
      flex: 1;
      width: 100%;
      position: relative;
      background: #fff;
    }

    .iframe-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .iframe-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.3);
      pointer-events: none;
    }

    .iframe-placeholder .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .iframe-placeholder .hint {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="layout">
    <!-- 侧边目录 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>调车计划目录</h2>
        <p class="subtitle">Shunting Plan Index</p>
      </div>

      <nav class="sidebar-nav" id="sidebarNav">
        <!-- JS 动态生成 -->
      </nav>

      <div class="sidebar-footer">
        <span class="version">v1.0.0</span>
      </div>
    </aside>

    <!-- 右侧内容区 -->
    <main class="content-area">
      <div class="content-header">
        <span class="current-file" id="currentFile">请从左侧选择一个文件</span>
        <span class="divider"></span>
        <button class="btn-refresh" id="btnRefresh" title="刷新当前页面">刷新</button>
      </div>

      <div class="iframe-wrapper">
        <div class="iframe-placeholder" id="placeholder">
          <div class="icon">📄</div>
          <div class="hint">选择左侧文件以查看内容</div>
        </div>
        <iframe id="contentFrame" style="display:none;"></iframe>
      </div>
    </main>
  </div>

  <script>
    // 文件列表
    const files = [
      { id: 'A001', label: 'A001 号调车计划', path: 'A001.html' },
      { id: 'A002', label: 'A002 号调车计划', path: 'A002.html' },
      { id: 'A003', label: 'A003 号调车计划', path: 'A003.html' },
      { id: 'A004', label: 'A004 号调车计划', path: 'A004.html' },
      { id: 'A005', label: 'A005 号调车计划', path: 'A005.html' }
    ];

    const sidebarNav = document.getElementById('sidebarNav');
    const contentFrame = document.getElementById('contentFrame');
    const placeholder = document.getElementById('placeholder');
    const currentFile = document.getElementById('currentFile');
    const btnRefresh = document.getElementById('btnRefresh');

    let activeFile = null;

    // 生成侧边栏导航
    files.forEach((file, index) => {
      const item = document.createElement('a');
      item.className = 'nav-item';
      item.href = '#';
      item.dataset.path = file.path;
      item.dataset.id = file.id;
      item.innerHTML = `
        <span class="nav-index">${String(index + 1).padStart(2, '0')}</span>
        <span class="nav-label">${file.label}</span>
      `;

      item.addEventListener('click', (e) => {
        e.preventDefault();
        loadFile(file, item);
      });

      sidebarNav.appendChild(item);
    });

    // 加载文件
    function loadFile(file, navItem) {
      // 更新侧边栏高亮
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      navItem.classList.add('active');

      // 切换显示
      placeholder.style.display = 'none';
      contentFrame.style.display = 'block';
      contentFrame.src = file.path;

      // 更新状态
      activeFile = file;
      currentFile.textContent = file.label + ' — ' + file.path;
      document.title = file.label + ' — 调车计划';
    }

    // 刷新按钮
    btnRefresh.addEventListener('click', () => {
      if (activeFile) {
        contentFrame.src = '';
        requestAnimationFrame(() => {
          contentFrame.src = activeFile.path;
        });
      }
    });

    // 默认加载第一个文件
    const firstItem = sidebarNav.querySelector('.nav-item');
    if (firstItem) {
      loadFile(files[0], firstItem);
    }
  </script>
</body>
</html>
